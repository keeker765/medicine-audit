<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识图谱 — 微生物报告智能解读系统</title>
<link rel="stylesheet" href="graph.css">
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
</head>
<body>

<!-- 工具栏 -->
<div id="toolbar">
  <a href="/chat" class="back-link" title="返回聊天">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </svg>
  </a>
  <h1 id="page-title">实体关系图</h1>
  <div class="search-wrap">
    <input id="search" placeholder="搜索节点…" autocomplete="off" />
    <div class="search-results" id="search-results"></div>
  </div>

  <!-- 实体图按钮组 -->
  <div id="graph-btns">
    <button class="btn active" data-filter="all">全部</button>
    <button class="btn" data-filter="Drug">药物</button>
    <button class="btn" data-filter="Organism">菌种</button>
    <button class="btn" data-filter="ResistanceMechanism">耐药</button>
    <button class="btn" data-filter="TreatmentPlan">治疗</button>
    <button class="btn" data-filter="DrugClass">药物类别</button>
    <button class="btn" onclick="fitGraph()">适应画布</button>
    <button class="btn" onclick="toggleLegend()">图例</button>
  </div>

  <!-- 树状图按钮组 -->
  <div id="tree-btns" style="display:none">
    <button class="btn" onclick="expandAll()">全部展开</button>
    <button class="btn" onclick="collapseAll()">全部收起</button>
    <button class="btn" onclick="resetView()">重置视图</button>
  </div>

  <!-- 视图切换 -->
  <button class="btn view-switch" id="btn-tree" onclick="switchView('tree')">树状图</button>
  <button class="btn view-switch" id="btn-graph" onclick="switchView('graph')" style="display:none">实体图</button>
</div>

<!-- 面包屑（树状图专用） -->
<div id="breadcrumb" style="display:none"></div>

<!-- 实体图画布 -->
<div id="cy"></div>

<!-- 树状图画布 -->
<div id="chart" style="display:none"></div>

<!-- 详情面板（实体图） -->
<div id="detail">
  <button class="close-btn" onclick="closeDetail()">&#10005;</button>
</div>

<!-- 图例（实体图） -->
<div class="legend" id="legend-panel" style="display:none;">
  <div class="legend-title">图例</div>
  <div id="legend-items"></div>
</div>

<!-- Tooltip（树状图） -->
<div id="tooltip"></div>

<div id="stats"></div>

<!-- JS 加载 -->
<script src="tree-data.js"></script>
<script src="tree-view.js"></script>
<script src="graph.js?v=20260417f"></script>
</body>
</html>
