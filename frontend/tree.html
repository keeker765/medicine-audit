/* ── 色彩方案（秋日暖色）── */
const DOMAIN_COLORS = {
  "元信息":       "#64748b",
  "药物详细信息": "#0891b2",
  "国家分级管理目录": "#8B6914",
  "级联报告规则": "#0e7490",
  "MIC折点":      "#ea580c",
  "治疗指南":     "#16a34a",
  "耐药机制":     "#dc2626",
  "天然耐药":     "#78716c",
  "覆盖菌种":     "#059669",
  "脚注":         "#64748b",
  "缩写":         "#8b5cf6",
  "参考文献":     "#64748b",
};
const DEFAULT_COLOR = "#94a3b8";

function getColor(d) {
  let n = d;
  while (n) {
    if (n.data && DOMAIN_COLORS[n.data.name]) return DOMAIN_COLORS[n.data.name];
    n = n.parent;
  }
  return DEFAULT_COLOR;
}

/* ── 布局 ── */
const W = window.innerWidth, H = window.innerHeight - 74;
const svg = d3.select("#chart").append("svg")
  .attr("width", W).attr("height", H);
const g = svg.append("g").attr("transform", `translate(180,${H/2})`);

const zoom = d3.zoom().scaleExtent([0.15, 4]).on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);

const tree = d3.tree().nodeSize([30, 320]);
const root = d3.hierarchy(RAW);
root.x0 = 0; root.y0 = 0;

/* 初始只展开前两层 */
root.descendants().forEach((d,i) => {
  if (d.depth > 1) { d._children = d.children; d.children = null; }
});

const tooltip = d3.select("#tooltip");

function update(source) {
  const treeData = tree(root);
  const nodes = treeData.descendants();
  const links = treeData.links();

  const link = g.selectAll(".link").data(links, d => d.target.data._key || d.target.data.name);
  link.enter().insert("path","g").attr("class","link")
    .merge(link).transition().duration(300)
    .attr("d", d3.linkHorizontal().x(d=>d.y).y(d=>d.x));
  link.exit().remove();

  const node = g.selectAll(".node").data(nodes, d => d.data._key || d.data.name);
  const enter = node.enter().append("g").attr("class", d => "node" + (d.children||d._children ? "" : " node--leaf"))
    .attr("transform", `translate(${source.y0||0},${source.x0||0})`)
    .on("click", (e, d) => { toggle(d); update(d); })
    .on("mouseover", showTip).on("mousemove", moveTip).on("mouseout", hideTip);

  enter.append("circle").attr("r", 5);
  enter.append("text").attr("dy", "0.35em").attr("x", d => (d.children||d._children) ? -10 : 10)
    .attr("text-anchor", d => (d.children||d._children) ? "end" : "start");

  const merged = enter.merge(node);
  merged.transition().duration(300).attr("transform", d => `translate(${d.y},${d.x})`);
  merged.select("circle")
    .attr("r", d => d.depth === 0 ? 8 : (d.children||d._children) ? 5.5 : 3.5)
    .style("fill", d => d._children ? getColor(d) : (d.children ? "rgba(255,255,255,0.9)" : getColor(d)))
    .style("stroke", d => getColor(d));

  merged.select("text").text(d => {
    let label = d.data.name;
    if (d.data.value !== undefined) label += ": " + (String(d.data.value).length > 50 ? String(d.data.value).slice(0,50)+"…" : d.data.value);
    if (d._children) label += ` [${countLeaves(d)}]`;
    return label;
  });

  node.exit().remove();
  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
  d3.select("#stats").text(`节点: ${nodes.length} | 深度: ${d3.max(nodes, d=>d.depth)}`);
}

function countLeaves(d) { if (!d._children && !d.children) return 1; return (d._children||d.children).reduce((s,c)=>s+countLeaves(c),0); }
function toggle(d) { if (d.children) { d._children = d.children; d.children = null; } else if (d._children) { d.children = d._children; d._children = null; } }

function expandAll() { root.descendants().forEach(d => { if(d._children){ d.children=d._children; d._children=null; } }); update(root); }
function collapseAll() { root.descendants().forEach(d => { if(d.depth>0 && d.children){ d._children=d.children; d.children=null; } }); update(root); }
function resetView() { svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(180,H/2)); }

function getPath(d) { const p=[]; let n=d; while(n){ p.unshift(n.data.name); n=n.parent; } return p.join(" › "); }

function showTip(e,d) {
  let html = `<div class="tt-key">${d.data.name}</div>`;
  if (d.data._key && d.data._key !== d.data.name) html += `<div style="color:#64748b;font-size:11px">key: ${d.data._key}</div>`;
  if (d.data.value !== undefined) html += `<div class="tt-val">${d.data.value}</div>`;
  if (d._children) html += `<div style="color:#0e7490">收起中，含 ${countLeaves(d)} 个子项</div>`;
  html += `<div class="tt-path">${getPath(d)}</div>`;
  tooltip.html(html).style("display","block");

  // breadcrumb
  const parts = []; let n=d; while(n){ parts.unshift(n); n=n.parent; }
  d3.select("#breadcrumb").html(parts.map((p,i) =>
    `<span onclick="focusNode(this)" data-idx="${i}">${p.data.name}</span>`
  ).join('<span class="sep">›</span>'));
}
function moveTip(e) { tooltip.style("left",(e.clientX+14)+"px").style("top",(e.clientY-10)+"px"); }
function hideTip() { tooltip.style("display","none"); }

/* ── 搜索 ── */
const searchInput = document.getElementById("search");
searchInput.addEventListener("input", () => {
  const q = searchInput.value.trim().toLowerCase();
  g.selectAll(".node").classed("node--match", false);
  if (!q) return;
  root.descendants().forEach(d => {
    const match = d.data.name.toLowerCase().includes(q)
      || (d.data._key||"").toLowerCase().includes(q)
      || (d.data.value||"").toString().toLowerCase().includes(q);
    if (match) {
      let n = d.parent;
      while(n) { if(n._children){ n.children=n._children; n._children=null; } n=n.parent; }
    }
  });
  update(root);
  setTimeout(() => {
    g.selectAll(".node").classed("node--match", d => {
      return d.data.name.toLowerCase().includes(q)
        || (d.data._key||"").toLowerCase().includes(q)
        || (d.data.value||"").toString().toLowerCase().includes(q);
    });
  }, 350);
});
document.addEventListener("keydown", e => { if(e.key==="/"){ e.preventDefault(); searchInput.focus(); } });

update(root);
svg.call(zoom.transform, d3.zoomIdentity.translate(180, H/2).scale(0.9));
</script>
</body>
